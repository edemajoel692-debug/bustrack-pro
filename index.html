<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0A2463">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BusTrack Pro">
<link rel="manifest" href="/manifest.json">
<title>BusTrack Pro v4 — Jinja Senior Secondary School</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#060E20;--surf:#0C1730;--surf2:#112044;--surf3:#162A58;
  --primary:#1040C8;--accent:#FF6B35;--accent2:#00D9B0;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --text:#E4EAF8;--muted:#7089B8;--faint:#2A3E6A;
  --danger:#FF3356;--warn:#FFB800;--success:#00D9B0;--info:#4A9EFF;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:14px;--shadow:0 8px 40px rgba(0,0,0,.6);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text)}
input,select,textarea,button{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:2px}

/* AUTH SCREENS */
.auth-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);z-index:100}
.auth-box{background:var(--surf);border:1px solid var(--border2);border-radius:20px;padding:32px;width:100%;max-width:440px;box-shadow:var(--shadow)}
.auth-logo{font-size:40px;margin-bottom:10px}
.auth-title{font-size:22px;font-weight:800;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.auth-msg{font-size:13px;color:var(--muted);margin-top:10px;text-align:center;min-height:20px}

/* APP LAYOUT */
#app{display:flex;height:100vh;height:100dvh;overflow:hidden}
#sidebar{width:252px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:transform .25s ease}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:54px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 18px;flex-shrink:0}
#page{flex:1;overflow-y:auto;padding:22px}

/* SIDEBAR */
.sb-brand{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#B03800);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-title{font-weight:800;font-size:14px;line-height:1.2}
.sb-title small{display:block;font-size:10px;color:var(--muted);font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px}
.sb-user{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sb-ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--primary));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-sec{padding:6px 14px 2px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;font-size:13px;color:var(--muted);border-radius:8px;margin:1px 6px;transition:all .12s;user-select:none}
.nav-item:hover{background:var(--surf2);color:var(--text)}
.nav-item.active{background:var(--primary);color:#fff}
.nav-item .ni{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.sb-bot{padding:10px;border-top:1px solid var(--border)}
.btn-logout{width:100%;padding:9px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;cursor:pointer;font-size:12.5px;transition:all .15s}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:9px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .12s;white-space:nowrap;text-decoration:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover:not(:disabled){background:#0830A8}
.btn-secondary{background:var(--surf2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover:not(:disabled){background:var(--surf3)}
.btn-success{background:#0A5C38;color:#fff}.btn-success:hover{background:#084A2C}
.btn-danger{background:rgba(255,51,86,.12);color:var(--danger);border:1px solid rgba(255,51,86,.2)}.btn-danger:hover{background:rgba(255,51,86,.22)}
.btn-warn{background:rgba(255,184,0,.12);color:var(--warn);border:1px solid rgba(255,184,0,.2)}
.btn-accent{background:var(--accent);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:7px}
.btn-sos{background:linear-gradient(135deg,#DD0020,#AA0018);color:#fff;padding:16px;font-size:16px;font-weight:800;border:none;border-radius:14px;cursor:pointer;width:100%;margin-top:10px;box-shadow:0 4px 20px rgba(220,0,32,.4);animation:sosp 2s ease-in-out infinite;letter-spacing:.5px}
@keyframes sosp{0%,100%{box-shadow:0 4px 20px rgba(220,0,32,.4)}50%{box-shadow:0 4px 40px rgba(220,0,32,.8)}}

/* CARDS */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.card-hd{padding:13px 17px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-hd-title{font-weight:700;font-size:14px}
.card-hd-sub{font-size:12px;color:var(--muted)}
.card-body{padding:14px 17px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px;margin-bottom:20px}
.stat{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:15px;position:relative;overflow:hidden}
.stat-val{font-size:26px;font-weight:800;font-family:var(--mono);line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:5px}
.stat-icon{position:absolute;right:12px;top:12px;font-size:20px;opacity:.25}
.stat.c-green{border-color:rgba(0,217,176,.25);background:rgba(0,217,176,.05)}.stat.c-green .stat-val{color:var(--success)}
.stat.c-blue{border-color:rgba(74,158,255,.25);background:rgba(74,158,255,.05)}.stat.c-blue .stat-val{color:var(--info)}
.stat.c-warn{border-color:rgba(255,184,0,.25);background:rgba(255,184,0,.05)}.stat.c-warn .stat-val{color:var(--warn)}
.stat.c-red{border-color:rgba(255,51,86,.25);background:rgba(255,51,86,.05)}.stat.c-red .stat-val{color:var(--danger)}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tbl tr:last-child td{border-bottom:none}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-green{background:rgba(0,217,176,.12);color:var(--success)}
.b-red{background:rgba(255,51,86,.12);color:var(--danger)}
.b-blue{background:rgba(74,158,255,.12);color:var(--info)}
.b-orange{background:rgba(255,107,53,.12);color:var(--accent)}
.b-grey{background:var(--surf2);color:var(--muted)}
.b-warn{background:rgba(255,184,0,.12);color:var(--warn)}

/* FORM */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.fg label{font-size:12px;font-weight:600;color:var(--muted)}
.inp{background:var(--surf2);border:1px solid var(--border2);color:var(--text);padding:9px 13px;border-radius:9px;font-size:13.5px;width:100%;transition:border-color .15s}
.inp:focus{outline:none;border-color:var(--primary)}
.inp::placeholder{color:var(--faint)}
select.inp option{background:var(--surf2)}
textarea.inp{resize:vertical;min-height:78px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* MODAL */
#modalBack{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
#modalBack.open{display:flex}
#modalBox{background:var(--surf);border-radius:var(--r);width:100%;max-width:580px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow);border:1px solid var(--border2)}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-weight:700;font-size:15px}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 8px;border-radius:6px;line-height:1}
.modal-close:hover{background:var(--surf2)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-ft{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* MAP */
#leafletMap{width:100%;height:100%;min-height:400px}
.map-wrap{border-radius:var(--r);overflow:hidden;border:1px solid var(--border);height:calc(100vh - 160px)}

/* STOP CARDS */
.stop-card{background:var(--surf2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.stop-hd{background:var(--surf3);padding:10px 13px;display:flex;align-items:center;gap:8px}
.stop-num{width:24px;height:24px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:11px;flex-shrink:0}
.stop-body{padding:9px 13px}
.stop-stu{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--border)}
.stop-stu:last-child{border-bottom:none}
.stu-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.stop-ft{padding:8px 13px;border-top:1px solid var(--border);display:flex;gap:6px}

/* NOTIFICATIONS */
.notif-item{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:7px;cursor:pointer;display:flex;gap:12px;transition:background .12s}
.notif-item:hover{background:var(--surf2)}
.notif-item.unread{border-left:3px solid var(--primary)}
.unread-dot{width:7px;height:7px;border-radius:50%;background:var(--primary);display:inline-block;margin-left:5px;vertical-align:middle}

/* MANIFEST */
.manifest-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.mcheck{width:28px;height:28px;border:2px solid var(--border2);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;font-size:14px}
.mcheck.on{background:var(--success);border-color:var(--success);color:#fff}

/* DRIVER HERO */
.trip-hero{background:linear-gradient(135deg,var(--surf2),var(--surf3));border:1px solid var(--border);border-radius:16px;padding:22px;text-align:center;margin-bottom:14px}
.btn-trip{width:100%;border:none;border-radius:13px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;transition:all .2s;margin-bottom:8px;letter-spacing:.5px}
.btn-start{background:linear-gradient(135deg,#009950,#007740);color:#fff}
.btn-start:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,153,80,.4)}
.btn-end{background:linear-gradient(135deg,#CC0020,#990018);color:#fff}
.btn-end:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(204,0,32,.4)}

/* PARENT HERO */
.parent-hero{background:linear-gradient(135deg,var(--primary),#071880);border-radius:16px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.parent-hero::after{content:'🚌';position:absolute;right:12px;bottom:-6px;font-size:60px;opacity:.12}
.ph-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.ph-stat{background:rgba(255,255,255,.1);border-radius:9px;padding:9px;text-align:center}
.ph-stat-val{font-size:12.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ph-stat-lbl{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px}

/* ETA */
.eta-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.eta-num{width:26px;height:26px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.eta-val{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--accent2);margin-left:auto;white-space:nowrap}
.eta-val.arriving{color:var(--success);animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ALERTS */
.alert-bar{padding:10px 15px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ab-sos{background:rgba(255,51,86,.1);border:1px solid rgba(255,51,86,.25);color:var(--danger)}
.ab-warn{background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.25);color:var(--warn)}
.ab-info{background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.25);color:var(--info)}

/* OFFLINE BANNER */
#offlineBanner{background:rgba(255,184,0,.1);border-bottom:1px solid rgba(255,184,0,.25);color:var(--warn);text-align:center;padding:6px 14px;font-size:12.5px;font-weight:600;display:none}

/* TOAST */
#toasts{position:fixed;top:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:8px;max-width:320px}
.toast{background:var(--surf3);border:1px solid var(--border);border-radius:10px;padding:11px 15px;font-size:13px;display:flex;gap:9px;align-items:flex-start;animation:tin .25s ease;box-shadow:var(--shadow)}
.toast.success{border-left:3px solid var(--success)}
.toast.error{border-left:3px solid var(--danger)}
.toast.warning{border-left:3px solid var(--warn)}
.toast.info{border-left:3px solid var(--info)}
@keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}

/* MISC */
.page-header{margin-bottom:18px}
.page-header h1{font-size:20px;font-weight:800;margin-bottom:3px}
.page-header p{font-size:13px;color:var(--muted)}
.row-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13.5px}
.row-item:last-child{border-bottom:none}
.row-label{color:var(--muted);font-size:12.5px}
.prog-bar{height:6px;background:var(--surf3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.empty{text-align:center;padding:40px 20px}
.empty-icon{font-size:44px;display:block;margin-bottom:12px;opacity:.45}
.empty h3{font-size:16px;font-weight:700;margin-bottom:6px}
.empty p{font-size:13px;color:var(--muted)}
.topbar-ico{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text);padding:5px;display:none}
.ob-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.ob-on{background:rgba(0,217,176,.12);color:var(--success)}
.ob-off{background:rgba(255,51,86,.12);color:var(--danger)}
.gps-badge{font-size:11px;padding:3px 8px;border-radius:20px;background:rgba(74,158,255,.12);color:var(--info);font-weight:600;display:none}
.divider{height:1px;background:var(--border);margin:12px 0}

@media(max-width:768px){
  #sidebar{position:fixed;inset:0 auto 0 0;z-index:300;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #sbOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;display:none}
  #sbOverlay.open{display:block}
  .topbar-ico{display:block!important}
  .form-row{grid-template-columns:1fr}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  #page{padding:14px}
}
</style>
</head>
<body>

<!-- OFFLINE BANNER -->
<div id="offlineBanner">📶 Offline — GPS stored locally (<span id="offCount">0</span> points pending sync)</div>

<!-- SCREENS (auth) -->
<div id="screenWrap" style="position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px">

  <!-- Checking -->
  <div id="sChecking" class="auth-box" style="text-align:center;max-width:380px">
    <div class="auth-logo">🚌</div>
    <div class="auth-title">BusTrack Pro v4</div>
    <div style="font-size:13px;color:var(--muted);margin-top:6px" id="checkMsg">Connecting to server…</div>
    <div style="margin-top:18px;display:flex;justify-content:center">
      <div style="width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite"></div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>

  <!-- Setup Wizard -->
  <div id="sSetup" class="auth-box" style="display:none;max-width:500px">
    <div class="auth-logo">🏫</div>
    <div class="auth-title">First Time Setup</div>
    <div class="auth-sub">BusTrack Pro v4 — Uganda 2026</div>
    <div class="form-row">
      <div class="fg"><label>School Name *</label><input class="inp" id="sw_school" value="Jinja Senior Secondary School"></div>
      <div class="fg"><label>School Address</label><input class="inp" id="sw_addr" placeholder="Jinja City, Eastern Uganda"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Admin Full Name *</label><input class="inp" id="sw_name" placeholder="Your full name"></div>
      <div class="fg"><label>Admin Email *</label><input class="inp" id="sw_email" type="email" placeholder="admin@jinja.ug"></div>
    </div>
    <div class="form-row">
      <div class="fg"><label>Password * (min 8)</label><input class="inp" id="sw_pwd" type="password" placeholder="••••••••"></div>
      <div class="fg"><label>School Phone</label><input class="inp" id="sw_phone" placeholder="+256 XXX XXXXXX"></div>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;margin-top:6px" onclick="doSetup()">🚀 Initialize System</button>
    <div class="auth-msg" id="setupMsg"></div>
  </div>

  <!-- Login -->
  <div id="sLogin" class="auth-box" style="display:none;max-width:400px">
    <div class="auth-logo">🚌</div>
    <div class="auth-title">Sign In</div>
    <div class="auth-sub" id="loginSchool">BusTrack Pro</div>
    <div class="fg" style="margin-top:8px"><label>Email Address</label><input class="inp" id="lEmail" type="email" placeholder="your@email.com" autocomplete="email"></div>
    <div class="fg"><label>Password</label><input class="inp" id="lPwd" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" onclick="doLogin()">Sign In →</button>
    <div class="auth-msg" id="loginMsg"></div>
    <p style="text-align:center;font-size:11px;color:var(--faint);margin-top:16px">BusTrack Pro v4.0 · Jinja Senior Secondary School · Uganda 2026</p>
  </div>

</div>

<!-- MAIN APP -->
<div id="app" style="display:none;height:100vh">
  <div id="sbOverlay" onclick="closeSB()"></div>
  <div id="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">🚌</div>
      <div class="sb-title">BusTrack Pro<small id="sbSchool">—</small></div>
    </div>
    <div class="sb-user">
      <div class="sb-ava" id="sbAva">?</div>
      <div style="min-width:0">
        <div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="sbName">—</div>
        <div style="font-size:11px;color:var(--muted)" id="sbRole">—</div>
      </div>
    </div>
    <div class="sb-nav" id="sbNav"></div>
    <div class="sb-bot">
      <div id="pwaBtn" style="display:none;margin-bottom:8px">

//  CONFIG
// ════════════════════════════════════════════════════════
const API = (() => {
  const h = window.location.hostname;
  const proto = window.location.protocol;
  if (!h || h === '' || h === 'localhost' || h === '127.0.0.1')
    return 'http://localhost:8080/api';
  if (h.includes('ngrok'))
    return proto + '//' + h + '/api';
  return proto + '//' + h + ':8080/api';
})();

let TOKEN  = localStorage.getItem('bt_token') || '';
let USER   = (() => { try { return JSON.parse(localStorage.getItem('bt_user') || 'null'); } catch(e) { return null; } })();
let SCHOOL = localStorage.getItem('bt_school') || 'BusTrack Pro';
let currentPage = '', activeMap = null, mapMarkers = {};
let gpsWatchId = null, offlineQueue = [], isOnline = navigator.onLine;
let deferredInstall = null;

try { offlineQueue = JSON.parse(localStorage.getItem('bt_gps_q') || '[]'); } catch(e) {}

// ════════════════════════════════════════════════════════
//  API
// ════════════════════════════════════════════════════════
async function api(method, path, data) {
  return new Promise((resolve) => {
    const xhr = new XMLHttpRequest();
    xhr.open(method, API + path, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.setRequestHeader('ngrok-skip-browser-warning', 'true');
    if (TOKEN) xhr.setRequestHeader('Authorization', 'Bearer ' + TOKEN);
    xhr.timeout = 8000;
    xhr.onload = function() {
      try {
        const j = JSON.parse(xhr.responseText);
        if (xhr.status === 401) { logout(); resolve(null); return; }
        resolve({ ok: xhr.status >= 200 && xhr.status < 300, status: xhr.status, data: j });
      } catch(e) {
        console.error('[API] parse error:', e.message, xhr.responseText);
        resolve({ ok: false, data: { error: 'Invalid response from server' } });
      }
    };
    xhr.onerror   = () => { console.error('[API] network error:', method, path); resolve({ ok: false, data: { error: 'Network error - server may be offline' } }); };
    xhr.ontimeout = () => { console.error('[API] timeout:', method, path); resolve({ ok: false, data: { error: 'Request timed out' } }); };
    xhr.send(data ? JSON.stringify(data) : null);
  });
}
const GET    = p     => api('GET', p);
const POST   = (p,d) => api('POST', p, d);
const PUT    = (p,d) => api('PUT', p, d);
const DELETE = p     => api('DELETE', p);

// ════════════════════════════════════════════════════════
//  INIT — simple, robust, no complex splash
// ════════════════════════════════════════════════════════
async function init() {
  const msgEl = document.getElementById('checkMsg');

  // Try up to 5 times with delay
  let r = null;
  for (let i = 1; i <= 5; i++) {
    if (msgEl) msgEl.textContent = i === 1 ? 'Connecting to server…' : `Retrying… (${i}/5)`;
    r = await GET('/system/status');
    if (r && r.ok) break;
    await new Promise(res => setTimeout(res, 1200));
  }

  if (!r || !r.ok) {
    if (msgEl) msgEl.textContent =
      '❌ Cannot connect. Make sure server.py is running, then press F5.';
    document.querySelector('#sChecking div[style*="margin-top:18px"]').style.display = 'none';
    return;
  }

  SCHOOL = r.data.school_name || 'BusTrack Pro';
  localStorage.setItem('bt_school', SCHOOL);

  if (!r.data.initialized) {
    showScreen('sSetup');
    return;
  }

  if (TOKEN && USER) {
    enterApp();
    return;
  }

  showScreen('sLogin');
  document.getElementById('loginSchool').textContent = SCHOOL;
}

function showScreen(id) {
  ['sChecking', 'sSetup', 'sLogin'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

function enterApp() {
  document.getElementById('screenWrap').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  buildSidebar();
  updateOnlineBadge();
  // Navigate to home page based on role
  if (USER.role === 'driver') navigate('driver-home');
  else if (USER.role === 'parent') navigate('parent-home');
  else navigate('dashboard');
}

// ════════════════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════════════════
async function doSetup() {
  const school = document.getElementById('sw_school').value.trim();
  const name   = document.getElementById('sw_name').value.trim();
  const email  = document.getElementById('sw_email').value.trim();
  const pwd    = document.getElementById('sw_pwd').value;
  const addr   = document.getElementById('sw_addr').value.trim();
  const phone  = document.getElementById('sw_phone').value.trim();
  const msg    = document.getElementById('setupMsg');

  if (!school || !name || !email || !pwd) { msg.textContent = '❌ Fill in all required fields'; return; }
  if (pwd.length < 8) { msg.textContent = '❌ Password must be at least 8 characters'; return; }

  msg.textContent = 'Setting up…';
  const r = await POST('/auth/setup', { school_name: school, school_address: addr, school_phone: phone, full_name: name, email, password: pwd });
  if (!r || !r.ok) { msg.textContent = '❌ ' + (r?.data?.error || 'Setup failed'); return; }

  TOKEN  = r.data.token;
  USER   = r.data.user;
  SCHOOL = school;
  localStorage.setItem('bt_token', TOKEN);
  localStorage.setItem('bt_user', JSON.stringify(USER));
  localStorage.setItem('bt_school', SCHOOL);
  toast('🎉 BusTrack Pro v4 initialized!', 'success');
  enterApp();
}

async function doLogin() {
  const email = document.getElementById('lEmail').value.trim();
  const pwd   = document.getElementById('lPwd').value;
  const msg   = document.getElementById('loginMsg');
  if (!email || !pwd) { msg.textContent = '❌ Enter email and password'; return; }
  msg.textContent = 'Signing in…';
  const r = await POST('/auth/login', { email, password: pwd });
  if (!r || !r.ok) { msg.textContent = '❌ ' + (r?.data?.error || 'Login failed'); return; }
  TOKEN = r.data.token;
  USER  = r.data.user;
  localStorage.setItem('bt_token', TOKEN);
  localStorage.setItem('bt_user', JSON.stringify(USER));
  toast('Welcome, ' + USER.full_name + '!', 'success');
  enterApp();
}

function logout() {
  POST('/auth/logout', {});
  TOKEN = ''; USER = null;
  localStorage.removeItem('bt_token');
  localStorage.removeItem('bt_user');
  stopGPS();
  document.getElementById('app').style.display = 'none';
  document.getElementById('screenWrap').style.display = 'flex';
  showScreen('sChecking');
  init();
}

// ════════════════════════════════════════════════════════
//  OFFLINE GPS QUEUE
// ════════════════════════════════════════════════════════
function storeOfflineGPS(point) {
  offlineQueue.push({ ...point, recorded_at: new Date().toISOString() });
  if (offlineQueue.length > 500) offlineQueue = offlineQueue.slice(-500);
  try { localStorage.setItem('bt_gps_q', JSON.stringify(offlineQueue)); } catch(e) {}
  document.getElementById('offCount').textContent = offlineQueue.length;
}

async function syncOfflineGPS() {
  if (!isOnline || offlineQueue.length === 0) return;
  const r = await POST('/gps/batch', { points: offlineQueue });
  if (r && r.ok) {
    toast('📶 Back online! ' + offlineQueue.length + ' GPS points synced', 'success');
    offlineQueue = [];
    localStorage.removeItem('bt_gps_q');
  }
}

// ════════════════════════════════════════════════════════
//  GPS
// ════════════════════════════════════════════════════════
function startGPS(busId, tripId) {
  if (gpsWatchId) navigator.geolocation?.clearWatch(gpsWatchId);
  document.getElementById('gpsBadge').style.display = 'inline-flex';
  let lastSent = 0;
  gpsWatchId = navigator.geolocation?.watchPosition(async pos => {
    const now = Date.now();
    if (now - lastSent < 5000) return;
    lastSent = now;
    const point = {
      trip_id: tripId, bus_id: busId,
      latitude: pos.coords.latitude, longitude: pos.coords.longitude,
      speed_kmh: pos.coords.speed ? pos.coords.speed * 3.6 : 0,
      heading: pos.coords.heading || 0, accuracy_m: pos.coords.accuracy,
      recorded_at: new Date().toISOString()
    };
    if (isOnline) {
      const r = await POST('/gps', point);
      if (!r || !r.ok) storeOfflineGPS(point);
    } else {
      storeOfflineGPS(point);
    }
  }, err => console.log('[GPS]', err.message),
  { enableHighAccuracy: true, timeout: 15000, maximumAge: 3000 });
}

function stopGPS() {
  if (gpsWatchId) { navigator.geolocation?.clearWatch(gpsWatchId); gpsWatchId = null; }
  document.getElementById('gpsBadge').style.display = 'none';
}

async function triggerSOS() {
  if (!confirm('🚨 SEND SOS EMERGENCY?\n\nThis will immediately alert ALL admins via SMS and WhatsApp!')) return;
  const send = async (lat, lon) => {
    const r = await POST('/sos', { latitude: lat, longitude: lon, message: 'SOS EMERGENCY from ' + USER.full_name + '!' });
    if (r && r.ok) toast('🚨 SOS SENT! All admins notified!', 'error');
    else toast('Error sending SOS — try again', 'error');
  };
  navigator.geolocation?.getCurrentPosition(
    pos => send(pos.coords.latitude, pos.coords.longitude),
    ()  => send(null, null)
  );
}

            ${b.current_speed_kmh > 0 ? `<div style="font-size:11px;color:var(--accent2);font-family:var(--mono)">📡 ${b.current_speed_kmh?.toFixed(0)} km/h</div>` : ''}
          </div>`).join('')}
        </div>
      </div>
      ${USER.role === 'admin' ? `<div class="card" style="flex-shrink:0">
        <div class="card-hd"><div class="card-hd-title">📣 Notify Parents at Stop</div></div>
        <div style="padding:8px 12px">
          ${stops.slice(0,4).map(s => `<button class="btn btn-secondary btn-xs" style="width:100%;margin-bottom:5px;justify-content:flex-start;text-align:left" onclick="notifyStop(${s.id},'${(s.stop_name||'').replace(/'/g,"\\'")}')">
            📣 Stop ${s.stop_order}: ${s.stop_name}
          </button>`).join('')}
        </div>
      </div>` : ''}
      <div class="card">
        <div class="card-hd"><div class="card-hd-title">⏱️ ETAs</div></div>
        <div style="padding:8px 12px" id="etaList">
          <div style="color:var(--muted);font-size:12px;text-align:center;padding:12px">${trips.length === 0 ? 'No active trips' : 'Loading…'}</div>
        </div>
      </div>
    </div>
  </div>`);

  // Init Leaflet map
  setTimeout(async () => {
    if (!window.L) { toast('Map library loading — check internet connection', 'warning'); return; }
    activeMap = L.map('leafletMap', { center: [0.44, 33.20], zoom: 13 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom: 19
    }).addTo(activeMap);

    window.focusBus = (lat, lng, code) => { if (lat && lng) activeMap.flyTo([lat, lng], 15); };

    // School marker
    const schoolIco = L.divIcon({ html: `<div style="background:#0A2463;border:3px solid #FF6B35;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 3px 12px rgba(0,0,0,.5)">🏫</div>`, iconSize:[34,34], iconAnchor:[17,17], className:'' });
    L.marker([0.44, 33.20], { icon: schoolIco }).addTo(activeMap).bindPopup(`<strong>${SCHOOL}</strong>`);

    // Stop markers
    stops.forEach(s => {
      if (!s.latitude || !s.longitude) return;
      const ico = L.divIcon({ html: `<div style="background:#FF6B35;border:2px solid #fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.4)">${s.stop_order}</div>`, iconSize:[26,26], iconAnchor:[13,13], className:'' });
      L.marker([s.latitude, s.longitude], { icon: ico }).addTo(activeMap)
       .bindPopup(`<strong>Stop ${s.stop_order}: ${s.stop_name}</strong><br>${s.landmark||''}<br>⬆ ${s.scheduled_morning_time||'TBD'} · ⬇ ${s.scheduled_afternoon_time||'TBD'}<br>👥 ${(s.pickup_students||0)+(s.dropoff_students||0)} students`);
    });

    // Bus markers
    fleet.forEach(b => {
      if (!b.current_lat || !b.current_lng) return;
      const ico = L.divIcon({ html: `<div style="background:${b.status==='active'?'#00D9B0':'#7089B8'};border:2px solid #fff;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 3px 10px rgba(0,0,0,.4)">🚌</div>`, iconSize:[34,34], iconAnchor:[17,17], className:'' });
      mapMarkers[b.id] = L.marker([b.current_lat, b.current_lng], { icon: ico })
        .addTo(activeMap)
        .bindPopup(`<strong>${b.bus_code}</strong><br>${b.driver_name||'—'}<br>Speed: ${b.current_speed_kmh?.toFixed(0)||0} km/h<br>Students: ${b.student_count||0}`);
    });

    // Auto-refresh positions
    const refresh = setInterval(async () => {
      if (currentPage !== 'live-map') { clearInterval(refresh); return; }
      const fr = await GET('/buses/fleet');
      (fr?.data||[]).forEach(b => {
        if (mapMarkers[b.id] && b.current_lat && b.current_lng)
          mapMarkers[b.id].setLatLng([b.current_lat, b.current_lng]);
      });
    }, 5000);

    // Load ETAs
    if (trips.length > 0) {
      const er = await GET(`/trips/${trips[0].id}/stops`);
      const etaEl = document.getElementById('etaList');
      if (etaEl && er?.data) {
        etaEl.innerHTML = (er.data||[]).map(s => `<div class="eta-row">
          <div class="eta-num">${s.stop_order}</div>
          <div style="flex:1;min-width:0"><div style="font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.stop_name}</div>
          <div style="font-size:11px;color:var(--muted)">${s.status}</div></div>
          <div class="eta-val ${s.eta_minutes&&s.eta_minutes<2?'arriving':''}">${s.status==='arrived'?'✅':s.eta_minutes?'~'+Math.round(s.eta_minutes)+'m':'—'}</div>
        </div>`).join('');
      }
    }
  }, 100);
}

async function notifyStop(stopId, stopName) {
  const tr = await GET('/trips/active'); const trips = tr?.data || [];
  if (trips.length === 0) { toast('No active trip — start a trip first', 'warning'); return; }
  const mins = prompt(`Bus is how many minutes away from "${stopName}"?`, '2');
  if (!mins) return;
  const r = await POST('/trips/notify-stop', { trip_id: trips[0].id, stop_id: stopId, minutes_away: parseInt(mins) });
  if (!r || !r.ok) { toast(r?.data?.error || 'Error', 'error'); return; }
  toast(`✅ Parents at ${stopName} notified via SMS + WhatsApp!`, 'success');
}

async function loadStopsWithStudents(rid) {
  const stopsR = await GET(`/routes/${rid}/stops`);
  const stops  = stopsR?.data || [];
  const el     = document.getElementById('stops-' + rid);
  if (!el) return;
  if (stops.length === 0) { el.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:6px 0">No stops yet — click "+ Add Stop"</div>`; return; }
  const studs = {};
  await Promise.all(stops.map(async s => { const sr = await GET(`/stops/${s.id}/students`); studs[s.id] = sr?.data||[]; }));
  const ptColor = pt => pt==='pickup'?'b-green':pt==='dropoff'?'b-orange':'b-blue';
  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:12px;margin-top:6px">
  ${stops.map(s => {
    const ss = studs[s.id]||[], pk = ss.filter(x=>x.stop_type==='pickup'), dr = ss.filter(x=>x.stop_type==='dropoff');
    return `<div class="stop-card">
      <div class="stop-hd">
        <div class="stop-num">${s.stop_order}</div>
        <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.stop_name}</div>
        ${s.landmark?`<div style="font-size:10.5px;color:var(--muted)">${s.landmark}</div>`:''}</div>
        <span class="badge ${ptColor(s.point_type)}" style="font-size:9.5px;flex-shrink:0">${s.point_type||'both'}</span>
      </div>
      <div style="padding:6px 13px;display:flex;gap:12px;border-bottom:1px solid var(--border);font-size:11px">
        ${s.scheduled_morning_time?`<span>⬆ <strong>${s.scheduled_morning_time}</strong></span>`:''}
        ${s.scheduled_afternoon_time?`<span>⬇ <strong>${s.scheduled_afternoon_time}</strong></span>`:''}
        <span style="margin-left:auto;color:var(--muted)">${ss.length} student${ss.length!==1?'s':''}</span>
      </div>
      <div class="stop-body">
        ${ss.length===0?`<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0">No students here yet</div>`
        :`${pk.length>0?`<div style="font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--success);font-weight:600;margin-bottom:4px">⬆ Pickup (${pk.length})</div>
          ${pk.map(st=>`<div class="stop-stu"><div class="stu-av" style="background:linear-gradient(135deg,var(--accent2),var(--primary))">${(st.full_name||'S')[0]}</div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${st.full_name}</div><div style="font-size:10px;color:var(--muted)">${st.class_name||''}</div></div></div>`).join('')}`:''}
          ${dr.length>0?`<div style="font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);font-weight:600;margin:${pk.length?'8':'0'}px 0 4px">⬇ Dropoff (${dr.length})</div>
          ${dr.map(st=>`<div class="stop-stu"><div class="stu-av" style="background:linear-gradient(135deg,var(--accent),var(--danger))">${(st.full_name||'S')[0]}</div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${st.full_name}</div><div style="font-size:10px;color:var(--muted)">${st.class_name||''}</div></div></div>`).join('')}`:''}
        `}
      </div>
      <div class="stop-ft">
        <button class="btn btn-success btn-xs" style="flex:1" onclick="notifyStop(${s.id},'${(s.stop_name||'').replace(/'/g,"\\'")}')">📣 Notify Parents</button>
        <button class="btn btn-secondary btn-xs" onclick="openAddStudentToStopModal(${s.id},'${(s.stop_name||'').replace(/'/g,"\\'")}',${rid})">+ Student</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

async function submitStudentToStop(stopId, routeId) {
  const no = document.getElementById('ss_no')?.value?.trim(), name = document.getElementById('ss_name')?.value?.trim();
  const p1 = document.getElementById('ss_p1')?.value||null, p2 = document.getElementById('ss_p2')?.value||null;
  const stype = document.getElementById('ss_stype')?.value||'both';
  if (!no||!name) { toast('Student number and name required','error'); return; }
  if (!p1) { toast('At least one parent required','error'); return; }
  const pids = [parseInt(p1)]; if (p2 && p2 !== p1) pids.push(parseInt(p2));
  const body = { student_number:no, full_name:name, class_name:document.getElementById('ss_class')?.value?.trim(), gender:document.getElementById('ss_gender')?.value||null, bus_id:document.getElementById('ss_bus')?.value?parseInt(document.getElementById('ss_bus').value):null, pickup_stop_id:(stype==='pickup'||stype==='both')?stopId:null, dropoff_stop_id:(stype==='dropoff'||stype==='both')?stopId:null, parent_ids:pids, emergency_contact:document.getElementById('ss_emg')?.value?.trim(), emergency_phone:document.getElementById('ss_emgph')?.value?.trim() };
  const r = await POST('/students', body);
  if (!r||!r.ok) { toast(r?.data?.error||'Error','error'); return; }
  toast(`✅ ${name} enrolled! Parents notified via SMS.`,'success');
  closeModal(); loadStopsWithStudents(routeId);
}

async function deleteRoute(id, name) {

  await DELETE(`/routes/${id}`); toast('Route deactivated','warning'); pageRoutes();
}

function openAddStudentModal(buses,parents,stops) {
  openModal('Quick Enroll Student',`
    <div class="form-row"><div class="fg"><label>Student Number *</label><input class="inp" id="ms2_no" placeholder="2024/001"></div><div class="fg"><label>Full Name *</label><input class="inp" id="ms2_name" placeholder="Full name"></div></div>
    <div class="form-row"><div class="fg"><label>Class</label><input class="inp" id="ms2_class" placeholder="S4A"></div><div class="fg"><label>Gender</label><select class="inp" id="ms2_gender"><option value="">--</option><option value="male">Male</option><option value="female">Female</option></select></div></div>
    <div class="form-row"><div class="fg"><label>Bus</label><select class="inp" id="ms2_bus"><option value="">--</option>${(buses||[]).map(b=>`<option value="${b.id}">${b.bus_code}</option>`).join('')}</select></div><div class="fg"><label>Pickup Stop</label><select class="inp" id="ms2_pu"><option value="">--</option>${(stops||[]).map(s=>`<option value="${s.id}">${s.stop_name}</option>`).join('')}</select></div></div>
    <div class="fg"><label>Dropoff Stop (if different)</label><select class="inp" id="ms2_dr"><option value="">-- Same as pickup --</option>${(stops||[]).map(s=>`<option value="${s.id}">${s.stop_name}</option>`).join('')}</select></div>
    <div class="fg"><label>Primary Parent *</label><select class="inp" id="ms2_p1"><option value="">-- Select --</option>${(parents||[]).map(p=>`<option value="${p.id}">${p.full_name} (${p.phone||p.email})</option>`).join('')}</select></div>
    <div class="fg"><label>Second Parent (optional)</label><select class="inp" id="ms2_p2"><option value="">-- None --</option>${(parents||[]).map(p=>`<option value="${p.id}">${p.full_name}</option>`).join('')}</select></div>`,
    `<button class="btn btn-primary" onclick="submitAddStudent()">Enroll Student</button>`);
}

async function submitAddStudent() {
  const no=document.getElementById('ms2_no')?.value?.trim(), name=document.getElementById('ms2_name')?.value?.trim();
  const p1=document.getElementById('ms2_p1')?.value||null, p2=document.getElementById('ms2_p2')?.value||null;
  const pickupId=document.getElementById('ms2_pu')?.value||null, dropoffId=document.getElementById('ms2_dr')?.value||pickupId;
  if(!no||!name){toast('Number and name required','error');return;}
  if(!p1){toast('At least one parent required','error');return;}
  const pids=[parseInt(p1)]; if(p2&&p2!==p1) pids.push(parseInt(p2));
  const body={student_number:no,full_name:name,class_name:document.getElementById('ms2_class')?.value?.trim(),gender:document.getElementById('ms2_gender')?.value||null,bus_id:document.getElementById('ms2_bus')?.value?parseInt(document.getElementById('ms2_bus').value):null,pickup_stop_id:pickupId?parseInt(pickupId):null,dropoff_stop_id:dropoffId?parseInt(dropoffId):null,parent_ids:pids};
  const r=await POST('/students',body);
  if(!r||!r.ok){toast(r?.data?.error||'Error','error');return;}
  toast(`✅ ${name} enrolled!`,'success'); closeModal(); pageStudents();
}

async function viewStudent(sid) {
  const r=await GET(`/students/${sid}`); const s=r?.data;
  if(!s){toast('Not found','error');return;}
  openModal(`Student — ${s.full_name}`,`
    <div>${ri('Student No.',s.student_number)}${ri('Class',s.class_name||'—')}${ri('Bus',s.bus_code||'Not assigned')}${ri('Pickup',s.pickup_stop_name?`⬆ ${s.pickup_stop_name} @ ${s.pickup_time||'TBD'}`:'—')}${ri('Dropoff',s.dropoff_stop_name?`⬇ ${s.dropoff_stop_name} @ ${s.dropoff_time||'TBD'}`:'—')}${ri('QR Code',`<code style="font-size:10px">${s.qr_code||'—'}</code>`)}${ri('Status',s.is_active?'✅ Active':'❌ Inactive')}</div>
    ${(s.parents||[]).length>0?`<div style="margin-top:12px"><div style="font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:600;letter-spacing:.6px">Parents</div>
    ${(s.parents||[]).map(p=>`<div style="background:var(--surf2);border-radius:8px;padding:9px 12px;margin-bottom:6px;font-size:13px"><div style="font-weight:600">${p.full_name} <span class="badge b-grey" style="font-size:10px">${p.relationship||'parent'}</span>${p.is_primary?` <span class="badge b-green" style="font-size:10px">Primary</span>`:''}</div><div style="color:var(--muted);font-size:11.5px;margin-top:2px">📱 ${p.phone||'—'} · 📧 ${p.email||'—'}</div></div>`).join('')}</div>`:''}`);
}

async function deactivateStudent(id,name) {
  if(!confirm(`Deactivate ${name}? Record kept permanently.`)) return;
  await DELETE(`/students/${id}`); toast(`${name} deactivated`,'warning'); pageStudents();
}

        <td style="font-size:12px">${u.email}</td><td>${u.phone||'—'}</td><td>${u.whatsapp_phone||u.phone||'—'}</td>
        <td>${u.is_active?`<span class="badge b-green">Active</span>`:`<span class="badge b-grey">Inactive</span>`}</td>
        <td style="font-size:11.5px;color:var(--muted)">${u.last_login?new Date(u.last_login).toLocaleDateString():'Never'}</td>
        <td style="display:flex;gap:4px">
          <button class="btn btn-xs btn-secondary" onclick="openEditUserModal(${u.id},'${(u.full_name||'').replace(/'/g,"\\'")}','${u.phone||''}','${u.whatsapp_phone||''}','${role}',${u.is_active})">✏️</button>
          <button class="btn btn-xs btn-danger" onclick="deactivateUser(${u.id},'${(u.full_name||'').replace(/'/g,"\\'")}','${role}')">🗑</button>

function openAddUserModal(role) {
  const label=role==='driver'?'Driver':'Parent';
  openModal(`Add New ${label}`,`
    <div class="fg"><label>Full Name *</label><input class="inp" id="mu_name" placeholder="${label} full name"></div>
    <div class="form-row"><div class="fg"><label>Email *</label><input class="inp" id="mu_email" type="email" placeholder="email@example.com"></div><div class="fg"><label>Phone *</label><input class="inp" id="mu_phone" placeholder="+256 XXX XXXXXX"></div></div>
    <div class="fg"><label>WhatsApp (if different from phone)</label><input class="inp" id="mu_wa" placeholder="+256 XXX XXXXXX"></div>
    <div class="form-row"><div class="fg"><label>Password * (min 8)</label><input class="inp" id="mu_pwd" type="password"></div><div class="fg"><label>Confirm Password</label><input class="inp" id="mu_pwd2" type="password"></div></div>`,
    `<button class="btn btn-primary" onclick="submitAddUser('${role}')">Add ${label}</button>`);
}

async function submitAddUser(role) {
  const name=document.getElementById('mu_name')?.value?.trim(), email=document.getElementById('mu_email')?.value?.trim();
  const phone=document.getElementById('mu_phone')?.value?.trim(), wa=document.getElementById('mu_wa')?.value?.trim();
  const pwd=document.getElementById('mu_pwd')?.value, pwd2=document.getElementById('mu_pwd2')?.value;
  if(!name||!email||!pwd){toast('Name, email and password required','error');return;}
  if(pwd!==pwd2){toast('Passwords do not match','error');return;}
  if(pwd.length<8){toast('Password too short','error');return;}
  const r=await POST('/users',{full_name:name,email,phone,whatsapp_phone:wa||phone,password:pwd,role});
  if(!r||!r.ok){toast(r?.data?.error||'Error','error');return;}
  toast(`✅ ${name} added! Welcome SMS sent.`,'success'); closeModal(); pageUsers(role);
}

function openEditUserModal(id,name,phone,wa,role,isActive) {
  openModal(`Edit — ${name}`,`
    <div class="fg"><label>Full Name</label><input class="inp" id="eu_name" value="${name}"></div>
    <div class="form-row"><div class="fg"><label>Phone</label><input class="inp" id="eu_phone" value="${phone}"></div><div class="fg"><label>WhatsApp</label><input class="inp" id="eu_wa" value="${wa}"></div></div>
    <div class="fg"><label>New Password (leave blank to keep)</label><input class="inp" id="eu_pwd" type="password"></div>
    <div class="fg"><label>Status</label><select class="inp" id="eu_active"><option value="1" ${isActive?'selected':''}>Active</option><option value="0" ${!isActive?'selected':''}>Inactive</option></select></div>`,
    `<button class="btn btn-primary" onclick="submitEditUser(${id},'${role}')">Save</button>`);
}

async function submitEditUser(id,role) {
  const body={full_name:document.getElementById('eu_name')?.value?.trim(),phone:document.getElementById('eu_phone')?.value?.trim(),whatsapp_phone:document.getElementById('eu_wa')?.value?.trim(),is_active:parseInt(document.getElementById('eu_active')?.value)};
  const pwd=document.getElementById('eu_pwd')?.value; if(pwd) body.password=pwd;
  const r=await PUT(`/users/${id}`,body);
  if(!r||!r.ok){toast(r?.data?.error||'Error','error');return;}
  toast('✅ Updated!','success'); closeModal(); pageUsers(role);
}

async function deactivateUser(id,name,role) {
  if(!confirm(`Deactivate ${name}? Record kept permanently.`)) return;
  await DELETE(`/users/${id}`); toast(`${name} deactivated`,'warning'); pageUsers(role);
}

async function pageBuses() {

  const buses=busesR?.data||[], drivers=driversR?.data||[], routes=routesR?.data||[];

  </div>

async function submitAddBus() {
  const body={bus_code:document.getElementById('mb_code')?.value?.trim()?.toUpperCase(),plate_number:document.getElementById('mb_plate')?.value?.trim()?.toUpperCase(),make_model:document.getElementById('mb_model')?.value?.trim(),capacity:parseInt(document.getElementById('mb_cap')?.value),gps_device_type:document.getElementById('mb_gps')?.value,gps_device_id:document.getElementById('mb_gpsid')?.value?.trim(),assigned_driver:document.getElementById('mb_driver')?.value||null,route_id:document.getElementById('mb_route')?.value||null,insurance_expiry:document.getElementById('mb_ins')?.value||null,next_service:document.getElementById('mb_svc')?.value||null};
  if(!body.bus_code||!body.plate_number||!body.capacity){toast('Bus code, plate and capacity required','error');return;}
  const r=await POST('/buses',body);
  if(!r||!r.ok){toast(r?.data?.error||'Error','error');return;}
  toast(`✅ ${body.bus_code} registered!`,'success'); closeModal(); pageBuses();
}

function openAssignModal(busId,busCode,drivers,routes) {
  openModal(`Assign — ${busCode}`,`
    <div class="fg"><label>Assign Driver</label><select class="inp" id="as_drv"><option value="">-- Select --</option>${(drivers||[]).map(d=>`<option value="${d.id}">${d.full_name} (${d.phone||'no phone'})</option>`).join('')}</select></div>
    <div class="fg"><label>Assign Route</label><select class="inp" id="as_rt"><option value="">-- Select --</option>${(routes||[]).map(r=>`<option value="${r.id}">${r.route_code} — ${r.route_name}</option>`).join('')}</select></div>`,
    `<button class="btn btn-primary" onclick="submitAssign(${busId})">Assign</button>`);
}

async function submitAssign(busId) {
  const body={driver_id:document.getElementById('as_drv')?.value||null,route_id:document.getElementById('as_rt')?.value||null};
  const r=await POST(`/buses/${busId}/assign`,body);
  if(!r||!r.ok){toast('Error','error');return;}
  toast('✅ Assigned!','success'); closeModal(); pageBuses();
}

async function deactivateBus(id,code) {
  if(!confirm(`Deactivate ${code}?`)) return;
  await DELETE(`/buses/${id}`); toast(`${code} deactivated`,'warning'); pageBuses();
}

function openCreateTripModal(buses,routes) {
  openModal('Create New Trip',`
    <div class="fg"><label>Bus *</label><select class="inp" id="ct_bus"><option value="">-- Select bus --</option>${(buses||[]).map(b=>`<option value="${b.id}|${b.assigned_driver||''}">${b.bus_code} — ${b.driver_name||'no driver'}</option>`).join('')}</select></div>
    <div class="fg"><label>Route *</label><select class="inp" id="ct_route"><option value="">-- Select route --</option>${(routes||[]).map(r=>`<option value="${r.id}">${r.route_code} — ${r.route_name}</option>`).join('')}</select></div>
    <div class="fg"><label>Trip Type</label><select class="inp" id="ct_type"><option value="morning">Morning</option><option value="afternoon">Afternoon</option><option value="special">Special</option></select></div>`,
    `<button class="btn btn-primary" onclick="submitCreateTrip()">Create Trip</button>`);
}

async function submitCreateTrip() {
  const busVal=document.getElementById('ct_bus')?.value, routeId=document.getElementById('ct_route')?.value;
  if(!busVal||!routeId){toast('Bus and route required','error');return;}
  const [busId,driverId]=busVal.split('|');
  const r=await POST('/trips',{bus_id:parseInt(busId),route_id:parseInt(routeId),driver_id:parseInt(driverId||USER.id),trip_type:document.getElementById('ct_type')?.value});
  if(!r||!r.ok){toast(r?.data?.error||'Error','error');return;}
  toast('✅ Trip created!','success'); closeModal(); pageTrips();
}

async function pageAlerts() {
  const [aR,sosR]=await Promise.all([GET('/alerts'),GET('/sos/active')]);
  const alerts=aR?.data||[], sos=sosR?.data||[];
  const unresolved=alerts.filter(a=>!a.is_resolved);
  pw(`
  <div class="page-header"><h1>Alerts & SOS 🚨</h1></div>
  ${sos.length>0?`<div class="alert-bar ab-sos">🚨 <strong>${sos.length} ACTIVE SOS!</strong>
    ${sos.map(s=>`<span> · ${s.driver_name||'Driver'} (${s.bus_code||'?'}) <button class="btn btn-xs btn-success" onclick="resolveSOS(${s.id})" style="margin-left:4px">✓ Resolve</button></span>`).join('')}
  </div>`:''}
  ${unresolved.length>0?`<div class="alert-bar ab-warn">⚠️ ${unresolved.length} unresolved alert${unresolved.length>1?'s':''}</div>`:''}
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-bottom:14px">
    <button class="btn btn-primary" onclick="openCreateAlertModal()">+ Create Alert</button>
  </div>
  <div class="card"><div style="overflow-x:auto">
    ${alerts.length===0?emptyState('✅','All Clear','No alerts.')
    :`<table class="tbl"><thead><tr><th>Type</th><th>Severity</th><th>Bus</th><th>Title</th><th>Time</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${alerts.map(a=>`<tr>
      <td style="font-size:12px">${(a.alert_type||'').replace(/_/g,' ')}</td>
      <td><span class="badge ${a.severity==='critical'||a.severity==='high'?'b-red':a.severity==='medium'?'b-warn':'b-green'}">${a.severity}</span></td>
      <td>${a.bus_code||'—'}</td>
      <td><strong style="font-size:13px">${a.title}</strong></td>

async function startMyTrip(busId) {
  navigator.geolocation?.getCurrentPosition(async pos => {
    const br=await GET(`/buses/${busId}`); const bus=br?.data;
    if(!bus){toast('Bus not found','error');return;}
    const rr=await GET('/routes'); const routes=rr?.data||[];
    const route=routes.find(r=>r.route_name===bus.route_name||r.route_code===bus.route_code);
    if(!route){toast('No route found for this bus — ask admin to assign a route','warning');return;}
    const cr=await POST('/trips',{bus_id:busId,route_id:route.id,driver_id:USER.id,trip_type:'morning'});
    if(!cr||!cr.ok){toast(cr?.data?.error||'Error','error');return;}
    const sr=await POST('/trips/start',{trip_id:cr.data.id,latitude:pos.coords.latitude,longitude:pos.coords.longitude});
    if(!sr||!sr.ok){toast('Could not start trip','error');return;}
    startGPS(busId,cr.data.id);
    toast('🚌 Trip started! Parents notified via SMS.','success');
    pageDriverHome();
  }, async () => {
    const br=await GET(`/buses/${busId}`); const bus=br?.data;
    const rr=await GET('/routes'); const routes=rr?.data||[];
    const route=routes.find(r=>r.route_name===bus?.route_name);
    if(!route){toast('No route — ask admin to assign','warning');return;}
    const cr=await POST('/trips',{bus_id:busId,route_id:route.id,driver_id:USER.id,trip_type:'morning'});
    if(!cr||!cr.ok){toast(cr?.data?.error||'Error','error');return;}
    await POST('/trips/start',{trip_id:cr.data.id});
    toast('🚌 Trip started (GPS not available)','success');
    pageDriverHome();
  });
}

async function endMyTrip(tripId) {
  if(!confirm('End this trip?')) return;
  stopGPS();
  const r=await POST('/trips/end',{trip_id:tripId});
  if(!r||!r.ok){toast('Error','error');return;}
  toast('🏁 Trip completed! Parents notified.','success');
  pageDriverHome();
}

    <div class="card-hd"><div class="card-hd-title">Live GPS Data</div></div>
    <div class="card-body">
      <div class="row-item"><span class="row-label">GPS Status</span><span id="gstat" class="badge b-grey">Getting location…</span></div>
      <div class="row-item"><span class="row-label">Latitude</span><span id="glat" style="font-family:var(--mono);font-size:13px">—</span></div>
      <div class="row-item"><span class="row-label">Longitude</span><span id="glng" style="font-family:var(--mono);font-size:13px">—</span></div>
      <div class="row-item"><span class="row-label">Speed</span><span id="gspd" style="font-family:var(--mono);font-size:13px">—</span></div>
      <div class="row-item"><span class="row-label">Accuracy</span><span id="gacc" style="font-family:var(--mono);font-size:13px">—</span></div>
      <div class="row-item"><span class="row-label">Network</span><span id="gnet" class="badge ${isOnline?'b-green':'b-red'}">${isOnline?'Online':'Offline'}</span></div>
      <div class="row-item"><span class="row-label">Offline Queue</span><span id="gque" style="font-family:var(--mono);font-size:13px">${offlineQueue.length} points</span></div>
      <div class="row-item"><span class="row-label">Last Update</span><span id="gtim" style="font-size:12px;color:var(--muted)">—</span></div>
    </div>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn btn-primary" onclick="testGPS()">📍 Test GPS</button>
    <button class="btn btn-secondary" onclick="syncOfflineGPS()">📶 Sync Offline</button>
  </div>`);
  navigator.geolocation?.watchPosition(pos=>{
    const g=id=>document.getElementById(id);
    if(!g('glat')) return;
    g('gstat').textContent='✓ Active'; g('gstat').className='badge b-green';
    g('glat').textContent=pos.coords.latitude.toFixed(6)+'°N';
    g('glng').textContent=pos.coords.longitude.toFixed(6)+'°E';
    g('gspd').textContent=pos.coords.speed?(pos.coords.speed*3.6).toFixed(1)+' km/h':'0 km/h';
    g('gacc').textContent=pos.coords.accuracy?pos.coords.accuracy.toFixed(0)+'m':'—';
    g('gnet').textContent=isOnline?'Online':'Offline'; g('gnet').className='badge '+(isOnline?'b-green':'b-red');
    g('gque').textContent=offlineQueue.length+' points';
    g('gtim').textContent=new Date().toLocaleTimeString();
  }, err=>{const el=document.getElementById('gstat');if(el){el.textContent='✗ '+err.message;el.className='badge b-red';}},{enableHighAccuracy:true,timeout:15000});
}

function testGPS() {
  navigator.geolocation?.getCurrentPosition(pos=>toast(`📍 ${pos.coords.latitude.toFixed(5)}°N, ${pos.coords.longitude.toFixed(5)}°E — Accuracy: ${pos.coords.accuracy?.toFixed(0)}m`,'success'),err=>toast('GPS error: '+err.message,'error'),{enableHighAccuracy:true,timeout:15000});
}

// ════════════════════════════════════════════════════════
//  PARENT HOME
// ════════════════════════════════════════════════════════
async function pageParentHome() {
  const [studR,activeR]=await Promise.all([GET('/students'),GET('/trips/active')]);
  const students=studR?.data||[], activeTrips=activeR?.data||[];
  pw(`
  <div class="page-header"><h1>Hi, ${USER.full_name.split(' ')[0]} 👋</h1><p>Track your child's bus in real time</p></div>
  ${students.length===0?emptyState('👦','No Students Linked','Contact the school to link your children.')
  :students.map(s=>{
    const trip=activeTrips.find(t=>t.bus_code===s.bus_code);
    return `<div class="parent-hero" style="margin-bottom:14px">
      <div style="font-size:18px;font-weight:800;margin-bottom:4px">👦 ${s.full_name}</div>
      <div style="font-size:13px;color:rgba(255,255,255,.7);margin-bottom:2px">${s.class_name||''} · ${s.bus_code?`Bus ${s.bus_code}`:'No bus assigned'}</div>
      <div class="ph-stats">
        <div class="ph-stat"><div class="ph-stat-val">⬆ ${s.pickup_stop_name||'—'}</div><div class="ph-stat-lbl">Pickup</div></div>
        <div class="ph-stat"><div class="ph-stat-val">${s.pickup_time||'—'}</div><div class="ph-stat-lbl">Time</div></div>
        <div class="ph-stat"><div class="ph-stat-val">${trip?'🟢 Active':'⚫ No Trip'}</div><div class="ph-stat-lbl">Bus Status</div></div>
      </div>
    </div>
    <div class="g2" style="margin-bottom:14px">
      <div class="card"><div class="card-hd"><div class="card-hd-title">ℹ️ Details</div></div><div class="card-body">
        ${ri('Bus',s.bus_code||'Not assigned')}${ri('Route',s.route_name||'—')}${ri('Pickup',s.pickup_stop_name?`⬆ ${s.pickup_stop_name} @ ${s.pickup_time||'TBD'}`:'—')}${ri('Dropoff',s.dropoff_stop_name?`⬇ ${s.dropoff_stop_name} @ ${s.dropoff_time||'TBD'}`:'—')}
        <div style="display:flex;gap:7px;margin-top:12px;flex-wrap:wrap">
          <button class="btn btn-primary btn-sm" onclick="navigate('live-map')">🗺️ Track Live</button>
          <button class="btn btn-secondary btn-sm" onclick="navigate('parent-eta')">⏱️ Check ETA</button>
        </div>
      </div></div>
      <div class="card"><div class="card-hd"><div class="card-hd-title">${trip?'🟢 Bus Active':'⚫ Bus Idle'}</div></div><div class="card-body">
        ${trip?`${ri('Bus',trip.bus_code)}${ri('Speed',`${trip.current_speed_kmh?.toFixed(0)||0} km/h`)}${ri('Students',trip.boarded_count||0)}<button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:10px" onclick="navigate('live-map')">🗺️ Open Live Map</button>`
        :`<div style="text-align:center;padding:18px;color:var(--muted);font-size:13px">No active trip right now.</div>`}
      </div></div>
    </div>`;
  }).join('')}`);
}

// ════════════════════════════════════════════════════════
//  PARENT ETA
// ════════════════════════════════════════════════════════
async function pageParentETA() {
  const [studR,activeR]=await Promise.all([GET('/students'),GET('/trips/active')]);
  const students=studR?.data||[], trips=activeR?.data||[];
  const codes=students.map(s=>s.bus_code).filter(Boolean);
  const myTrip=trips.find(t=>codes.includes(t.bus_code));
  pw(`
  <div class="page-header"><h1>Bus ETA ⏱️</h1><p>Estimated arrival at your stop</p></div>
  ${!myTrip?`<div class="alert-bar ab-info">ℹ️ No active trip for your child's bus right now.</div>`
  :`<div class="card" style="margin-bottom:14px"><div class="card-hd"><div class="card-hd-title">🚌 ${myTrip.bus_code} — ${myTrip.route_name}</div><span class="badge b-green">Active</span></div>
    <div class="card-body">${ri('Driver',myTrip.driver_name||'—')}${ri('Speed',`${myTrip.current_speed_kmh?.toFixed(0)||0} km/h`)}${ri('Students',myTrip.boarded_count||0)}</div>
  </div>
  <div class="card" id="etaCard"><div class="card-hd"><div class="card-hd-title">📍 Stop ETAs</div><button class="btn btn-xs btn-secondary" onclick="pageParentETA()">↻ Refresh</button></div><div class="card-body" id="etaBody"><div style="color:var(--muted);font-size:13px">Loading…</div></div></div>`}`);
  if(myTrip){
    const er=await GET(`/trips/${myTrip.id}/stops`); const stops=er?.data||[];
    const el=document.getElementById('etaBody');
    if(el) el.innerHTML=stops.length===0?'<div style="color:var(--muted);font-size:13px">No stop data yet</div>'
      :stops.map(s=>`<div class="eta-row">
        <div class="eta-num">${s.stop_order}</div>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.stop_name}</div>
        <div style="font-size:11px;color:var(--muted)">${s.status}${s.arrived_at?` · arrived ${timeAgo(s.arrived_at)}`:''}</div></div>
        <div class="eta-val ${s.eta_minutes&&s.eta_minutes<2?'arriving':''}">${s.status==='arrived'?'✅':s.eta_minutes?'~'+Math.round(s.eta_minutes)+'m':'—'}</div>
      </div>`).join('');
    setTimeout(()=>{if(currentPage==='parent-eta')pageParentETA();},30000);
  }
}

// ════════════════════════════════════════════════════════
//  MODAL + TOAST + UTILS
// ════════════════════════════════════════════════════════
function openModal(title, body, actions='') {
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFt').innerHTML=`<button class="btn btn-secondary btn-sm" onclick="closeModal()">Close</button>${actions}`;
  document.getElementById('modalBack').classList.add('open');
}
function closeModal() { document.getElementById('modalBack').classList.remove('open'); }
document.getElementById('modalBack').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

function toast(msg, type='info') {
  const icons={success:'✅',warning:'⚠️',error:'🚨',info:'ℹ️'};
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span style="flex-shrink:0">${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.animation='tin .25s ease reverse';setTimeout(()=>el.remove(),250);},4500);
}

function toggleSB() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sbOverlay').classList.toggle('open'); }
function closeSB()  { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sbOverlay').classList.remove('open'); }

function filterTbl(inputId, tbodyId) {
  const q=(document.getElementById(inputId)?.value||'').toLowerCase();
  document.querySelectorAll(`#${tbodyId} tr`).forEach(tr=>{tr.style.display=!q||(tr.dataset.search||tr.textContent.toLowerCase()).includes(q)?'':'none';});
}

function emptyState(icon,title,msg,btn='') {
  return `<div class="empty"><span class="empty-icon">${icon}</span><h3>${title}</h3><p>${msg}</p>${btn}</div>`;
}

function ri(label,val) {
  return `<div class="row-item"><span class="row-label">${label}</span><strong>${val}</strong></div>`;
}

function timeAgo(dt) {
  if(!dt) return '—';
  const diff=Date.now()-new Date(dt).getTime();
  const s=diff/1000,m=s/60,h=m/60,d=h/24;
  if(s<60) return 'just now';
  if(m<60) return `${Math.floor(m)}m ago`;
  if(h<24) return `${Math.floor(h)}h ago`;
  return `${Math.floor(d)}d ago`;
}

function getMyLoc(latId,lngId) {
  navigator.geolocation?.getCurrentPosition(pos=>{
    document.getElementById(latId).value=pos.coords.latitude.toFixed(6);
    document.getElementById(lngId).value=pos.coords.longitude.toFixed(6);
    toast(`📍 ${pos.coords.latitude.toFixed(4)}°N, ${pos.coords.longitude.toFixed(4)}°E`,'success');
  },err=>toast('GPS not available','warning'),{enableHighAccuracy:true,timeout:15000});
}
